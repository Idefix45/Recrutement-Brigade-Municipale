<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Dashboard Recruteur</title>

  <style>


    *{
  box-sizing:border-box;
}

body{
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

    body{
      margin:0;
      font-family:Arial;
      background:#0f172a;
      color:white;
      padding:20px;
    }

    h1{
  text-align:center;
  margin-bottom:25px;
  font-size:30px;
  font-weight:800;
  letter-spacing:1px;
  background:linear-gradient(135deg,#60a5fa,#3b82f6,#2563eb);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

    .card{
  background:rgba(30, 41, 59, 0.75);
  padding:18px;
  border-radius:18px;
  box-shadow:0 10px 35px rgba(0,0,0,0.4);
  backdrop-filter: blur(12px);
  border:1px solid rgba(148,163,184,0.15);
  line-height:1.6;

  display:flex;
  flex-direction:column;
  height:100%;
  transition:0.25s ease;
}

.card:hover{
  transform:translateY(-6px);
  box-shadow:0 18px 50px rgba(0,0,0,0.6);
  border:1px solid rgba(59,130,246,0.35);
}

    .btn{
  margin-top:10px;
  padding:12px 14px;
  border:none;
  border-radius:12px;
  cursor:pointer;
  font-weight:600;
  letter-spacing:0.3px;
  transition:0.2s ease;
  box-shadow:0 6px 18px rgba(0,0,0,0.25);
}

.btn:hover{
  transform:translateY(-2px);
  filter:brightness(1.1);
}

.btn:active{
  transform:scale(0.98);
}

/* ACCEPT */
.accept{
  background:linear-gradient(135deg,#22c55e,#16a34a);
  color:white;
}

/* REJECT */
.reject{
  background:linear-gradient(135deg,#ef4444,#dc2626);
  color:white;
}

/* CLOSE */
.close{
  background:linear-gradient(135deg,#3b82f6,#2563eb);
  color:white;
}


   #list{
  display:grid;
  grid-template-columns: repeat(3, minmax(0, 1fr));
  gap:25px;
  width:100%;
}


.card b{
  font-size:18px;
  color:#60a5fa;
}

.card br{
  display:block;
  margin-bottom:4px;
}

.countdown{
  display:inline-block;
  min-width: 110px;
  text-align:left;
  white-space:nowrap;
  font-variant-numeric: tabular-nums;
}


.footer{
  margin-top:auto;
  display:flex;
  flex-direction:column;
  gap:10px;
}


.info{
  font-size:14px;
  opacity:0.9;
}









.modal{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.7);
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:999;
}

.hidden{ display:none; }

.modal-box{
  background:#1e293b;
  padding:25px;
  border-radius:15px;
  width:350px;
  text-align:center;
}

.reasons{
  display:flex;
  flex-direction:column;
  gap:10px;
  margin:15px 0;
}

.reason{
  padding:10px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  background:#0f172a;
  color:white;
  transition:0.2s;
}

.reason:hover{
  background:#2563eb;
}

.reason.selected{
  background:#16a34a;
}

.modal-actions{
  display:flex;
  justify-content:space-between;
}

.modal-actions button{
  padding:10px;
  border:none;
  border-radius:8px;
  cursor:pointer;
}

#cancelReason{
  background:#dc2626;
  color:white;
}

#confirmReason{
  background:#16a34a;
  color:white;
}



.top-buttons{
  display:flex;
  gap:15px;
  margin-bottom:20px;
}


.accepted-btn{
  background:#16a34a;
}

.refused-btn{
  background:#dc2626;
}

.filter-btn{
  flex:1;
  padding:12px;
  border:none;
  border-radius:12px;

  background:#1e293b;
  color:#cbd5e1;

  font-size:15px;
  font-weight:600;

  cursor:pointer;
  transition:0.2s ease;

  box-shadow:0 6px 15px rgba(0,0,0,0.2);
}

.filter-btn:hover{
  transform:translateY(-2px);
  background:#334155;
  color:white;
}

.filter-btn.active{
  background:linear-gradient(135deg,#3b82f6,#2563eb);
  color:white;
  box-shadow:0 10px 25px rgba(37,99,235,0.3);
}



input#search{
  width:100%;
  padding:12px;
  border-radius:12px;
  border:1px solid transparent;
  background:#1e293b;
  color:white;
  font-size:15px;
  outline:none;
  transition:0.2s;
}

input#search:focus{
  border:1px solid #3b82f6;
  box-shadow:0 0 0 4px rgba(59,130,246,0.15);
}




.top-buttons button{
  flex:1;
  padding:14px;
  border-radius:12px;
  font-size:16px;
  font-weight:700;
  cursor:pointer;
  transition:0.2s;
}


.accepted-btn{
  background:linear-gradient(135deg,#22c55e,#16a34a);
  color:white;
}

.refused-btn{
  background:linear-gradient(135deg,#ef4444,#dc2626);
  color:white;
}


.filters{
  display:flex;
  gap:10px;
  margin-bottom:20px;
  width:100%;
}

.filters .filter-btn{
  flex:1 1 0;
  width:100%;
}


.stats-btn{
  flex:1;
  padding:14px;
  border:none;
  border-radius:12px;
  font-size:16px;
  font-weight:700;
  cursor:pointer;
  transition:0.2s ease;

  background:linear-gradient(135deg,#6366f1,#3b82f6);
  color:white;

  box-shadow:0 8px 20px rgba(59,130,246,0.25);
}

.stats-btn:hover{
  transform:translateY(-2px);
  filter:brightness(1.1);
}
  </style>
</head>

<body>

<h1>Dashboard Recruteur</h1>

<input type="text" id="search" placeholder="🔎 Rechercher un candidat..." style="
  width:100%;
  padding:12px;
  margin-bottom:20px;
  border-radius:10px;
  border:none;
  outline:none;
  background:#1e293b;
  color:white;
  font-size:16px;
">

<div class="top-buttons">

  <button onclick="window.location.href='accepted.html'" class="filter-btn accepted-btn">
    🟢 Acceptés
  </button>

  <button onclick="window.location.href='refused.html'" class="filter-btn refused-btn">
    🔴 Refusés
  </button>

  <button onclick="window.location.href='stats.html'" class="stats-btn">
  📊 Statistiques
</button>

</div>

<div class="filters">

  <button class="filter-btn active" data-filter="all">
    📋 Tout
  </button>

  <button class="filter-btn" data-filter="notvoted">
    🟡 Pas voté
  </button>

  <button class="filter-btn" data-filter="voted">
    🟢 Voté
  </button>

</div>

<div id="list"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getFirestore,
  collection,
  getDocs,
  updateDoc,
  doc,
  getDoc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAAze3ItBHUdN4MtvU8DzlUwcVu0W4ywfo",
  authDomain: "recrutement-brigade-municpale.firebaseapp.com",
  projectId: "recrutement-brigade-municpale",
  storageBucket: "recrutement-brigade-municpale.appspot.com",
  messagingSenderId: "130575947554",
  appId: "1:130575947554:web:75fe8bcff763ac67e3377b"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);


let selectedDocId = null;
let selectedReason = null;

// 🔐 CHECK RECRUTEUR
const user = JSON.parse(localStorage.getItem("user"));

if(!user || user.role !== "recruteur"){
  window.location.href = "index.html";
}


async function vote(docId, value){

  const ref = doc(db, "applications", docId);
  const snap = await getDoc(ref);

  const data = snap.data();
  const votes = data.votes || {};

  const userKey = user.nom + "_" + user.prenom;

  const current = votes[userKey];

  // 🔥 logique propre
  if (current === value) {
    // re-clique même vote = on retire
    delete votes[userKey];
  } else {
    // change vote
    votes[userKey] = value;
  }

  await updateDoc(ref, { votes });

  loadApplications();
}




const list = document.getElementById("list");
const searchInput = document.getElementById("search");
searchInput.addEventListener("input", () => {
  loadApplications(searchInput.value.toLowerCase());
});
let allApplications = [];
let currentFilter = "all";

async function closeApplication(docId) {

  const ref = doc(db, "applications", docId);
  const snap = await getDoc(ref);

  const data = snap.data();
  const votes = data.votes || {};

  let oui = 0;
  let non = 0;

  Object.values(votes).forEach(v => {
    if (v === 1) oui++;
    if (v === -1) non++;
  });

  let decision = "egalité";

  if (oui > non) decision = "accepté";
  else if (non > oui) decision = "refusé";

  await updateDoc(ref, {
  status: "closed",
  manualClose: true,
  decision: decision
});

setTimeout(loadApplications, 200);

}

// 📥 CHARGER CANDIDATURES
async function loadApplications(search = ""){

  const snapshot = await getDocs(collection(db, "applications"));

list.innerHTML = "";

// 🔥 tableau temporaire
const apps = [];

snapshot.forEach((docSnap) => {

  apps.push({
    id: docSnap.id,
    ...docSnap.data()
  });

});

// 🔥 tri par date (plus récent en premier)
apps.sort((a, b) => b.createdAt - a.createdAt);

// 🔥 affichage
apps.forEach((data) => {

    const fullName = `${data.nom} ${data.prenom}`.toLowerCase();

const userKey = user.nom + "_" + user.prenom;

const hasVoted =
  data.votes &&
  data.votes[userKey] !== undefined;

    

if (search && !fullName.includes(search)) return;

// 🔥 FILTRES

if (currentFilter === "notvoted" && hasVoted) return;

if (currentFilter === "voted" && !hasVoted) return;
    const now = Date.now();

const isClosed =
  data.status === "closed" ||
  data.manualClose === true ||
  (data.voteEndAt && now >= data.voteEndAt);

const isOpen = !isClosed;

if (isClosed) return; // 🔥 AJOUT ICI

let oui = 0;
let non = 0;

if (data.votes) {
  Object.values(data.votes).forEach(v => {
    if (v === 1) oui++;
    if (v === -1) non++;
  });
} 



// 🔥 FERMETURE AUTO APRÈS 72H
if (
  data.status !== "closed" &&
  data.voteEndAt &&
  now >= data.voteEndAt
) {

  let decision = "egalité";

  if (oui > non) {
    decision = "accepté";
  }
  else if (non > oui) {
    decision = "refusé";
  }

  updateDoc(doc(db, "applications", data.id), {
    status: "closed",
    decision: decision
  });

}

const total = oui - non;
const myVote = data.votes?.[userKey];
// ⏳ COMPTE À REBOURS
let countdown = "Fermé";

if (data.voteEndAt && now < data.voteEndAt) {

  const diff = data.voteEndAt - now;

  const hours = Math.floor(diff / (1000 * 60 * 60));
  const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
  const seconds = Math.floor((diff % (1000 * 60)) / 1000);

  countdown = `${hours}h ${minutes}m ${seconds}s`;
}






function resetModal(){
  document.querySelectorAll(".reason").forEach(b => b.classList.remove("selected"));
  selectedReason = null;
}








const div = document.createElement("div");
div.classList.add("card");

// 🔥 couleur carte
if (total > 0) {
  div.style.border = "2px solid #16a34a";
  div.style.background = "#0f2f1a";
}
else if (total < 0) {
  div.style.border = "2px solid #dc2626";
  div.style.background = "#2a0f12";
}
else {
  div.style.border = "2px solid #475569";
  div.style.background = "#1e293b";
}

    div.innerHTML = `
  <b>${data.nom} ${data.prenom}</b><br>
  
  <div class="info">Âge RP : ${data.age}</div>
  <div class="info">Âge HRP : ${data.ageH}</div>

  Motivation : ${data.motivation}<br><br>
  Expérience : ${data.experience}<br>
  <br>
  Status : ${
  data.status === "pending"
    ? "⏳ En attente"
    : data.status === "closed"
    ? "🔴 Clôturé"
    : "Inconnu"
}<br>
  Vote : ${isOpen ? "🟢 Ouvert" : "🔴 Fermé"}<br>
  <div class="timer-line">
  ⏳ Fermeture dans : <span class="countdown" data-end="${data.voteEndAt}">${countdown}</span>
</div>

  👍 Oui : ${oui} <br>
  👎 Non : ${non} <br>
  Total : ${total}

  <br>

  <div class="footer">
${!isClosed ? `
  ${myVote !== 1 ? `
  <button class="btn accept">Accepter</button>
` : ""}

${myVote !== -1 ? `
  <button class="btn reject">Refuser</button>
` : ""}

<button class="btn close">Clôturer</button>
` : `<p style="color:gray">Votes clôturés</p>`}
</div>
`;

    // ✔ ACCEPTER
    const acceptBtn = div.querySelector(".accept");
const rejectBtn = div.querySelector(".reject");
const closeBtn = div.querySelector(".close");

if (acceptBtn) {
  acceptBtn.onclick = () => vote(data.id, 1);
}

if (rejectBtn) {
  rejectBtn.onclick = () => {

  selectedDocId = data.id;
  selectedReason = null;

  // 🔥 RESET VISUEL OBLIGATOIRE
  document.querySelectorAll(".reason").forEach(b => {
    b.classList.remove("selected");
  });

  document.getElementById("reasonModal").classList.remove("hidden");
};
}

if (closeBtn) {
  closeBtn.onclick = () => closeApplication(data.id);
}

    list.appendChild(div);

  });

}


document.querySelectorAll(".reason").forEach(btn => {
  btn.onclick = () => {

    document.querySelectorAll(".reason").forEach(b => b.classList.remove("selected"));

    btn.classList.add("selected");
    selectedReason = btn.textContent;
  };
});



document.getElementById("cancelReason").onclick = () => {
  document.getElementById("reasonModal").classList.add("hidden");

  // reset des variables
  selectedReason = null;
  selectedDocId = null;

  // reset visuel des boutons
  document.querySelectorAll(".reason").forEach(b => {
    b.classList.remove("selected");
  });
};


document.getElementById("confirmReason").onclick = async () => {

  if (!selectedDocId || !selectedReason) {
  alert("Choisis une raison !");
  return;
}

  const ref = doc(db, "applications", selectedDocId);
  const snap = await getDoc(ref);

  const data = snap.data();

  const reasons = data.reasons || {};
  const votes = data.votes || {};

  const userKey = user.nom + "_" + user.prenom;

  // ✅ STRUCTURE PROPRE
  reasons[userKey] = {
    vote: -1,
    reason: selectedReason
  };

  votes[userKey] = -1;

  await updateDoc(ref, {
    reasons,
    votes
  });

  document.getElementById("reasonModal").classList.add("hidden");

  selectedReason = null;
  selectedDocId = null;

  loadApplications();
};

document.querySelectorAll(".filter-btn").forEach(btn => {

  if (!btn.dataset.filter) return;

  btn.onclick = () => {

    document.querySelectorAll(".filter-btn").forEach(b => {
      if (b.dataset.filter) {
        b.classList.remove("active");
      }
    });

    btn.classList.add("active");

    currentFilter = btn.dataset.filter;

    loadApplications(searchInput.value.toLowerCase());
  };

});

loadApplications();

setInterval(() => {

  const timers = document.querySelectorAll(".countdown");

  timers.forEach(timer => {

    let end = Number(timer.dataset.end);
    let now = Date.now();

    let diff = end - now;

    if (diff <= 0) {
      timer.textContent = "🔴 Fermé";
      return;
    }

    const hours = Math.floor(diff / (1000 * 60 * 60));
    const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
    const seconds = Math.floor((diff % (1000 * 60)) / 1000);

    timer.textContent = `${hours}h ${minutes}m ${seconds}s`;

  });

}, 1000);


</script>



<div id="reasonModal" class="modal hidden">
  <div class="modal-box">

    <h2>❌ Raison du refus</h2>

    <div class="reasons">
      <button class="reason">Utilisation de l'IA</button>
      <button class="reason">Manque de motivation</button>
      <button class="reason">Expérience insuffisante</button>
      <button class="reason">Manque de sérieux</button>
      <button class="reason">Candidature incomplète</button>
    </div>

    <div class="modal-actions">
      <button id="cancelReason">Annuler</button>
      <button id="confirmReason">Valider</button>
    </div>

  </div>
</div>



</body>
</html>
