<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Résultat candidature</title>

<style>

body{
  margin:0;
  background:#0f172a;
  color:white;
  font-family:Arial;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  overflow:hidden;
}

/* carte principale animée */
.card{
  background:#1e293b;
  padding:40px;
  border-radius:20px;
  width:420px;
  text-align:center;
  box-shadow:0 0 30px rgba(0,0,0,0.5);

  opacity:0;
  transform:translateY(20px) scale(0.98);
  animation:cardIn 0.6s ease forwards;
}

/* animation d'entrée */
@keyframes cardIn{
  to{
    opacity:1;
    transform:translateY(0) scale(1);
  }
}

h1{
  margin-bottom:20px;
}

/* texte status animé */
#status{
  font-size:22px;
  font-weight:bold;
  opacity:0;
  animation:fadeText 0.8s ease 0.3s forwards;
}

@keyframes fadeText{
  to{
    opacity:1;
  }
}

/* badge stylé */
.badge{
  display:inline-block;
  padding:10px 18px;
  border-radius:12px;
  font-weight:bold;
  margin-bottom:15px;
  animation:pulse 1.5s infinite;
}

.accepted{
  background:#16a34a;
  box-shadow:0 0 20px rgba(34,197,94,0.4);
}

.refused{
  background:#dc2626;
  box-shadow:0 0 20px rgba(220,38,38,0.4);
}

.waiting{
  background:#f59e0b;
  box-shadow:0 0 20px rgba(245,158,11,0.4);
}

/* pulse */
@keyframes pulse{
  0%{ transform:scale(1); }
  50%{ transform:scale(1.05); }
  100%{ transform:scale(1); }
}

/* blocs info */
.box{
  margin-top:15px;
  padding:12px;
  border-radius:12px;
  background:rgba(255,255,255,0.05);
  font-size:14px;
  line-height:1.5;

  opacity:0;
  transform:translateY(10px);
  animation:boxIn 0.6s ease forwards;
}

.box:nth-child(2){
  animation-delay:0.4s;
}

.box:nth-child(3){
  animation-delay:0.6s;
}

@keyframes boxIn{
  to{
    opacity:1;
    transform:translateY(0);
  }
}

/* petit loader */
.loader{
  width:40px;
  height:40px;
  border:4px solid rgba(255,255,255,0.2);
  border-top-color:white;
  border-radius:50%;
  margin:20px auto;
  animation:spin 1s linear infinite;
}

@keyframes spin{
  to{ transform:rotate(360deg); }
}


.voting{
  background:#3b82f6;
  box-shadow:0 0 20px rgba(59,130,246,0.4);
}

</style>

</head>

<body>

<div class="card">
  <h1>Résultat candidature</h1>

  <div id="status">
    <div class="loader"></div>
    Chargement...
  </div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
  getFirestore,
  doc,
  getDoc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAAze3ItBHUdN4MtvU8DzlUwcVu0W4ywfo",
  authDomain: "recrutement-brigade-municpale.firebaseapp.com",
  projectId: "recrutement-brigade-municpale",
  storageBucket: "recrutement-brigade-municpale.appspot.com",
  messagingSenderId: "130575947554",
  appId: "1:130575947554:web:75fe8bcff763ac67e3377b"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const user = JSON.parse(localStorage.getItem("user"));

if(!user){
  window.location.href = "index.html";
}

const status = document.getElementById("status");

function setAnimatedHTML(html) {
  status.style.opacity = "0";
  status.style.transform = "translateY(10px)";

  setTimeout(() => {
    status.innerHTML = html;
    status.style.transition = "0.4s ease";
    status.style.opacity = "1";
    status.style.transform = "translateY(0)";
  }, 200);
}

const ref = doc(db, "applications", user.id);
const snap = await getDoc(ref);

if (!snap.exists()) {
  status.innerText = "Aucune candidature";
  status.style.color = "gray";
} else {
  const data = snap.data();

  if (data.status === "closed") {

  if (data.decision === "accepté") {
    setAnimatedHTML(`
  <div class="badge accepted">🎉 Accepté</div>

  <div class="box">
    ✔ Ton dossier a été validé<br>
    ✔ Tu peux ouvrir un ticket<br>
    ✔ Un recruteur va te contacter
  </div>
`);
  }

  else if (data.decision === "refusé") {
    setAnimatedHTML(`
  <div class="badge refused">❌ Candidature refusée</div>

  <div class="box">
    ⛔ Ta candidature n’a pas été retenue cette fois-ci<br>
    📊 Le vote des recruteurs n’a pas été favorable
  </div>

  <div class="box">
    🔁 Tu peux retenter ta chance dans 7 jours<br>
    📌 Nous t’encourageons à améliorer ton RP avant de repostuler
  </div>

  <div class="box">
    💡 Conseil : travaille ta motivation et ton expérience RP
  </div>
`);
  }

  else {
    setAnimatedHTML(`
      <div class="badge pending">⏳ Résultat inconnu</div>

      <div class="box">
        Le dossier est clôturé mais sans décision enregistrée<br>
        Contacte un recruteur si besoin
      </div>
    `);

  }

} else {
  setAnimatedHTML(`
      <div class="badge voting">🟦 Vote en cours</div>

      <div class="box">
        Les recruteurs analysent ta candidature<br>
        Chaque vote est en cours de traitement
      </div>

      <div class="box">
        ⏳ Résultat disponible sous 72h maximum
      </div>
    `);

  }
}

</script>

</body>
</html>
