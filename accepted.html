<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Dashboard Recruteur</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0f172a;
  color:white;
  padding:20px;
}

h1{
  text-align:center;
  margin-bottom:20px;
  color:#60a5fa;
}

#list{
  display:grid;
  grid-template-columns: repeat(3, 1fr);
  gap:40px;
}

.card{
  background:#1e293b;
  padding:18px;
  border-radius:16px;
  border:2px solid #475569;
  line-height:1.6;
}

.card b{
  font-size:18px;
  color:#60a5fa;
}

.info{
  font-size:14px;
  opacity:0.9;
}

.delete-btn{
  margin-top:10px;
  padding:10px;
  width:100%;
  border:none;
  border-radius:10px;
  background:#dc2626;
  color:white;
  font-weight:bold;
  cursor:pointer;
  transition:0.2s;
}

.delete-btn:hover{
  transform:scale(1.03);
}
</style>

</head>

<body>

<h1>Dashboard Recruteur</h1>
<input 
  type="text" 
  id="search"
  placeholder="🔎 Rechercher un candidat..."
  style="
    width:100%;
    padding:12px;
    margin-bottom:20px;
    border:none;
    border-radius:10px;
    background:#1e293b;
    color:white;
    font-size:16px;
    outline:none;
  "
>

<div id="list"></div>



<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getFirestore,
  collection,
  getDocs,
  deleteDoc,
  doc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAAze3ItBHUdN4MtvU8DzlUwcVu0W4ywfo",
  authDomain: "recrutement-brigade-municpale.firebaseapp.com",
  projectId: "recrutement-brigade-municpale",
  storageBucket: "recrutement-brigade-municpale.appspot.com",
  messagingSenderId: "130575947554",
  appId: "1:130575947554:web:75fe8bcff763ac67e3377b"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const list = document.getElementById("list");

const searchInput = document.getElementById("search");

async function loadApplications(search = "") {

  const snapshot = await getDocs(collection(db, "applications"));
  list.innerHTML = "";

  let count = 0;

  snapshot.forEach((docSnap) => {

    const data = docSnap.data();
    const fullName = `${data.nom} ${data.prenom}`.toLowerCase();

if (search && !fullName.includes(search)) return;

    const isClosed = data.status === "closed";
    const isAccepted = (data.decision || "").toLowerCase().trim() === "accepté";

    if (!isClosed || !isAccepted) return;

    count++;

    const div = document.createElement("div");
    div.classList.add("card");

    div.innerHTML = `
      <b>${data.nom} ${data.prenom}</b><br><br>

      <div class="info">Âge RP : ${data.age}</div>
      <div class="info">Âge HRP : ${data.ageH}</div><br>

      Motivation : ${data.motivation}<br><br>
      Expérience : ${data.experience}<br><br>

      Status : 🟢 Accepté & clôturé<br><br>
    `;



    list.appendChild(div);
  });

  checkEmpty();
}



function checkEmpty() {
  const cards = document.querySelectorAll(".card");

  if (cards.length === 0) {
    list.innerHTML = `
      <div style="
        grid-column: 1 / -1;
        text-align:center;
        font-size:18px;
        opacity:0.7;
        margin-top:40px;
      ">
        📭 Aucune candidature acceptée
      </div>
    `;
  }
}

searchInput.addEventListener("input", () => {
  loadApplications(searchInput.value.toLowerCase());
});
loadApplications();



</script>

</body>
</html>
