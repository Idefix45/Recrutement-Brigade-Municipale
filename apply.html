<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Candidature Brigade Municipale</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial;
    }

    body{
      background:#0f172a;
      color:white;
      display:flex;
      justify-content:center;
      align-items:center;
      min-height:100vh;
      padding:20px;
    }

    .container{
      width:100%;
      max-width:600px;
      background:#1e293b;
      padding:30px;
      border-radius:20px;
      box-shadow:0 0 20px rgba(0,0,0,0.4);
    }

    h1{
      text-align:center;
      margin-bottom:30px;
      font-size:32px;
    }

    input,
    textarea{
      width:100%;
      padding:15px;
      margin-bottom:20px;
      border:none;
      border-radius:10px;
      background:#0f172a;
      color:white;
      font-size:16px;
    }

    textarea{
      min-height:120px;
      resize:none;
    }

    button{
  width:100%;
  padding:15px;
  border:none;
  border-radius:12px;
  background:linear-gradient(135deg,#3b82f6,#2563eb);
  color:white;
  font-size:18px;
  font-weight:bold;
  cursor:pointer;
  transition:0.25s ease;
  box-shadow:0 10px 25px rgba(37,99,235,0.25);
  position:relative;
  overflow:hidden;
}

/* hover */
button:hover{
  transform:translateY(-2px);
  box-shadow:0 15px 35px rgba(37,99,235,0.4);
}

/* clic */
button:active{
  transform:translateY(1px) scale(0.98);
  box-shadow:0 8px 18px rgba(37,99,235,0.25);
}

/* effet glow léger */
button::after{
  content:"";
  position:absolute;
  top:0;
  left:-100%;
  width:100%;
  height:100%;
  background:linear-gradient(
    120deg,
    transparent,
    rgba(255,255,255,0.25),
    transparent
  );
  transition:0.5s;
}

button:hover::after{
  left:100%;
}

    .success{
  margin-top:20px;
  text-align:center;
  color:#22c55e;
  display:none;
  font-weight:bold;
  font-size:16px;
  padding:10px;
  border-radius:10px;
  background:rgba(34,197,94,0.1);
  border:1px solid rgba(34,197,94,0.3);
  animation:pop 0.4s ease;
}

@keyframes pop{
  from{
    opacity:0;
    transform:scale(0.9);
  }
  to{
    opacity:1;
    transform:scale(1);
  }
}


    #adminBtn{
  position:fixed;
  top:20px;
  right:20px;

  width:auto;

  padding:12px 20px;
  border:none;
  border-radius:10px;

  background:#dc2626;
  color:white;

  cursor:pointer;
  font-weight:bold;

  display:none;

  z-index:999;
}

#adminBtn:hover{
  background:#b91c1c;
}

  </style>
</head>

<body>

<button id="adminBtn">Recruteur</button>

<div class="container">

  <h1>Brigade Municipale</h1>

  <input type="text" id="nom" placeholder="Nom RP">

  <input type="text" id="prenom" placeholder="Prénom RP">

  <input type="number" id="age" placeholder="Âge RP">

  <input type="number" id="ageH" placeholder="Âge RP">

  <textarea id="motivation" placeholder="Pourquoi voulez-vous rejoindre la brigade municipale ?"></textarea>

  <textarea id="experience" placeholder="Vos expériences RP"></textarea>

  <button id="sendBtn">Envoyer la candidature</button>

<button onclick="window.location.href='resultat.html'" style="margin-top:15px;">
  Voir le résultat
</button>

<p class="success" id="success">Candidature envoyée !</p>
  

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getFirestore,
  doc,
  setDoc,
  getDoc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAAze3ItBHUdN4MtvU8DzlUwcVu0W4ywfo",
  authDomain: "recrutement-brigade-municpale.firebaseapp.com",
  projectId: "recrutement-brigade-municpale",
  storageBucket: "recrutement-brigade-municpale.appspot.com",
  messagingSenderId: "130575947554",
  appId: "1:130575947554:web:75fe8bcff763ac67e3377b"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// USER CHECK
const user = JSON.parse(localStorage.getItem("user"));

if (!user) {
  window.location.replace("index.html");
}

const adminBtn = document.getElementById("adminBtn");

if (user.role === "recruteur") {
  adminBtn.style.display = "block";
}

adminBtn.addEventListener("click", () => {
  window.location.href = "recruteur.html";
});

document.getElementById("sendBtn").addEventListener("click", async () => {

  const nom = document.getElementById("nom").value;
  const prenom = document.getElementById("prenom").value;
  const age = document.getElementById("age").value;
  const ageH = document.getElementById("ageH").value;
  const motivation = document.getElementById("motivation").value;
  const experience = document.getElementById("experience").value;

  if (!nom || !prenom || !age || !motivation || !experience) {
    alert("Remplis tous les champs");
    return;
  }

  try {

    // 🔒 CHECK ICI
    const checkRef = doc(db, "applications", user.id);
    const checkSnap = await getDoc(checkRef);

    if (checkSnap.exists()) {

  const data = checkSnap.data();

  // ❌ candidature encore active
  if (data.status !== "closed") {
    alert("❌ Tu as déjà une candidature en cours !");
    return;
  }

}

    // 💾 ENVOI
    await setDoc(doc(db, "applications", user.id), {
      userId: user.id,
      nom,
      prenom,
      age,
      ageH,
      motivation,
      experience,

      status: "pending",
      createdAt: Date.now(),
      voteEndAt: Date.now() + (1000 * 60 * 60 * 72),
      decision: "pending",
      manualClose: false,
      votes: {}
    });

    document.getElementById("success").style.display = "block";
    // 🧹 reset formulaire
document.getElementById("nom").value = "";
document.getElementById("prenom").value = "";
document.getElementById("age").value = "";
document.getElementById("ageH").value = "";
document.getElementById("motivation").value = "";
document.getElementById("experience").value = "";

  } catch (error) {
    console.log(error);
    alert(error.message);
  }

});

</script>

</body>
</html>
