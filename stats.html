<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Statistiques Candidatures</title>

  <style>
    body{
      margin:0;
      font-family:Arial;
      background:#0f172a;
      color:white;
      padding:20px;
    }

    h1{
      text-align:center;
      font-size:32px;
      background:linear-gradient(135deg,#60a5fa,#3b82f6,#2563eb);
      -webkit-background-clip:text;
      -webkit-text-fill-color:transparent;
      margin-bottom:30px;
    }

    .grid{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
      gap:20px;
    }

    .card{
      background:#1e293b;
      padding:20px;
      border-radius:16px;
      text-align:center;
      box-shadow:0 10px 25px rgba(0,0,0,0.3);
      transition:0.2s;
    }

    .card:hover{
      transform:translateY(-3px);
    }

    .card h2{
      font-size:14px;
      opacity:0.7;
      margin-bottom:10px;
    }

    .card p{
      font-size:28px;
      font-weight:bold;
      margin:0;
    }

    .accept{ color:#22c55e; }
    .reject{ color:#ef4444; }
    .pending{ color:#facc15; }

    .top{
      display:flex;
      justify-content:space-between;
      align-items:center;
      margin-bottom:20px;
    }

    .back{
      background:#2563eb;
      color:white;
      padding:10px 14px;
      border:none;
      border-radius:10px;
      cursor:pointer;
    }

    .back:hover{
      filter:brightness(1.1);
    }



    .stat-title{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:8px;
}

.tooltip{
  position:relative;
  width:18px;
  height:18px;
  border-radius:50%;
  background:#334155;
  color:white;
  font-size:12px;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  transition:0.2s;
}

.tooltip:hover{
  background:#3b82f6;
}

.tooltip::after{
  content:attr(data-tooltip);

  position:absolute;
  bottom:130%;
  left:50%;
  transform:translateX(-50%);

  background:#0f172a;
  color:white;

  padding:10px;
  border-radius:10px;

  width:220px;

  font-size:12px;
  line-height:1.4;

  opacity:0;
  pointer-events:none;

  transition:0.2s;

  box-shadow:0 10px 25px rgba(0,0,0,0.4);

  z-index:999;
}

.tooltip:hover::after{
  opacity:1;
}


.charts-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(420px,1fr));
  gap:25px;
  margin-top:35px;
}

.chart-card{
  background:rgba(30,41,59,0.95);
  border-radius:22px;
  padding:22px;

  box-shadow:
    0 10px 35px rgba(0,0,0,0.35),
    inset 0 1px 0 rgba(255,255,255,0.03);

  border:1px solid rgba(255,255,255,0.05);

  transition:0.25s;
}

.chart-card:hover{
  transform:translateY(-4px);
  box-shadow:
    0 20px 45px rgba(0,0,0,0.45),
    0 0 25px rgba(59,130,246,0.15);
}

.chart-card h3{
  margin:0 0 20px;
  font-size:18px;
  font-weight:700;
  text-align:center;
  color:#e2e8f0;
}

.chart-container{
  position:relative;
  height:320px;
  width:100%;
}

.dashboard-layout{
  display:flex;
  flex-direction:column;
  gap:35px;
}

/* SECTION STATS */
.stats-section{
  display:flex;
  flex-direction:column;
  gap:20px;
}

/* TITRES */
.section-title{
  font-size:22px;
  font-weight:800;
  color:#e2e8f0;
  margin-bottom:5px;
}

/* GRID STATS */
.grid{
  display:grid;

  grid-template-columns:
    repeat(auto-fit,minmax(240px,1fr));

  gap:20px;
}

/* CARDS */
.card{
  background:rgba(30,41,59,0.95);

  border-radius:20px;
  padding:22px;

  backdrop-filter:blur(10px);

  border:1px solid rgba(255,255,255,0.05);

  box-shadow:
    0 10px 35px rgba(0,0,0,0.35),
    inset 0 1px 0 rgba(255,255,255,0.03);

  transition:0.25s;
}

.card:hover{
  transform:translateY(-5px);
  box-shadow:
    0 18px 45px rgba(0,0,0,0.45),
    0 0 20px rgba(59,130,246,0.15);
}

/* CHARTS */
.charts-grid{
  display:grid;

  grid-template-columns:
    repeat(auto-fit,minmax(500px,1fr));

  gap:25px;

  align-items:stretch;
}

.chart-card{
  background:rgba(30,41,59,0.95);

  border-radius:22px;
  padding:24px;

  border:1px solid rgba(255,255,255,0.05);

  box-shadow:
    0 10px 35px rgba(0,0,0,0.35);

  transition:0.25s;
}

.chart-card:hover{
  transform:translateY(-4px);
}

.chart-card h3{
  text-align:center;
  margin-bottom:20px;
  color:#f8fafc;
  font-size:20px;
}

.chart-container{
  position:relative;
  width:100%;
  height:320px;
}

.stats-wrapper{
  display:flex;
  flex-direction:column;
  gap:35px;
}




.cand-control{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:18px;
  margin-top:10px;
}

.cand-number{
  font-size:32px;
  font-weight:800;
  margin:0;
  color:#ffffff;
  min-width:60px;
  text-align:center;
}

.arrow-mini{
  width:36px;
  height:36px;

  border-radius:10px;
  border:1px solid rgba(255,255,255,0.08);

  background:rgba(30,41,59,0.9);
  color:white;

  font-size:20px;
  font-weight:bold;

  cursor:pointer;

  transition:0.2s;
}

.arrow-mini:hover{
  background:#2563eb;
  transform:translateY(-2px);
}

.arrow-mini:active{
  transform:scale(0.95);
}

.cand-label{
  margin-top:8px;
  font-size:13px;
  opacity:0.7;
}
  </style>
</head>

<body>

<div class="top">
  <button class="back" onclick="window.location.href='dashboard.html'">
    ⬅ Retour
  </button>

  <h1>Statistiques Candidatures</h1>

  <div></div>
</div>

<div class="dashboard-layout">

  <div>
    <div class="section-title">📊 Vue globale</div>
    <div id="globalStats" class="grid"></div>
    
  </div>

  <div>
    <div class="section-title">🗳 Votes généraux</div>
    <div id="voteStats" class="grid"></div>
  </div>

  <div>
    <div class="section-title">👤 Mes statistiques</div>
    <div id="personalStats" class="grid"></div>
  </div>

</div>

<div class="charts-grid">

  <div class="chart-card">
    <h3>📋 Candidatures</h3>
    <div class="chart-container">
      <canvas id="pieStatus"></canvas>
    </div>
  </div>

  <div class="chart-card">
    <h3>🗳 Votes</h3>
    <div class="chart-container">
      <canvas id="barVotes"></canvas>
    </div>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getFirestore,
  collection,
  getDocs
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAAze3ItBHUdN4MtvU2...",
  authDomain: "recrutement-brigade-municpale.firebaseapp.com",
  projectId: "recrutement-brigade-municpale",
  storageBucket: "recrutement-brigade-municpale.appspot.com",
  messagingSenderId: "130575947554",
  appId: "1:130575947554:web:75fe8bcff763ac67e3377b"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const user = JSON.parse(localStorage.getItem("user"));

const userKey = user.nom + "_" + user.prenom;

let periodIndex = 2; 


function inPeriod(timestamp) {
  const now = Date.now();
  const day = 1000 * 60 * 60 * 24;

  const time = timestamp?.toMillis ? timestamp.toMillis() : timestamp;

  if (!time) return false;

  if (periodIndex === 0) return now - time <= day;
  if (periodIndex === 1) return now - time <= day * 7;
  if (periodIndex === 2) return now - time <= day * 30;

  return true;
}


window.changePeriod = (dir) => {
  periodIndex += dir;

  if (periodIndex < 0) periodIndex = 0;
  if (periodIndex > 2) periodIndex = 2;

  loadStats();
};

async function loadStats(){

  const snapshot = await getDocs(collection(db, "applications"));

  let total = 0;
  let accepted = 0;
  let refused = 0;
  let pending = 0;
  let myYes = 0;
  let myNo = 0;

  let totalVotes = 0;
  let totalYes = 0;
  let totalNo = 0;
  let totalTime = 0;
  let closedCount = 0;
  let candCount = 0;
  

  snapshot.forEach(doc => {
    const d = doc.data();
    total++;

    const created = d.createdAt?.toMillis?.() || d.createdAt;

if (created && inPeriod(created)) {
  candCount++;
}

    const votes = d.votes || {};
    if (votes[userKey] === 1) myYes++;

    if (d.createdAt && d.closedAt) {

  const created = d.createdAt?.toMillis?.() || d.createdAt;
  const closed = d.closedAt?.toMillis?.() || d.closedAt;

  totalTime += (closed - created);
  closedCount++;
}

if (votes[userKey] === -1) myNo++;

    Object.values(votes).forEach(v => {
      totalVotes++;
      if (v === 1) totalYes++;
      if (v === -1) totalNo++;
    });

    if (d.status === "closed") {
      if (d.decision === "accepté") accepted++;
      else if (d.decision === "refusé") refused++;
    } else {
      pending++;
    }
  });

  const acceptanceRate = total ? Math.round((accepted / total) * 100) : 0;
  const voteRatio = totalVotes ? Math.round((totalYes / totalVotes) * 100) : 0;
  const myTotal = myYes + myNo;

const myRate = myTotal
  ? Math.round((myYes / myTotal) * 100)
  : 0;

  const avgMs = closedCount ? totalTime / closedCount : 0;

const avgHours = Math.floor(avgMs / (1000 * 60 * 60));
const avgMinutes = Math.floor((avgMs % (1000 * 60 * 60)) / (1000 * 60));

  document.getElementById("globalStats").innerHTML = `

<div class="card">
  <div class="stat-title">
    <h2>Total candidatures</h2>
    <div class="tooltip"
         data-tooltip="Nombre total de candidatures reçues.">
      ?
    </div>
  </div>
  <p>${total}</p>
</div>

<div class="card">
  <div class="stat-title">
    <h2>Acceptées</h2>
    <div class="tooltip"
         data-tooltip="Candidatures validées définitivement par les recruteurs.">
      ?
    </div>
  </div>
  <p class="accept">${accepted}</p>
</div>

<div class="card">
  <div class="stat-title">
    <h2>Refusées</h2>
    <div class="tooltip"
         data-tooltip="Candidatures refusées définitivement après les votes.">
      ?
    </div>
  </div>
  <p class="reject">${refused}</p>
</div>

<div class="card">
  <div class="stat-title">
    <h2>En attente</h2>
    <div class="tooltip"
         data-tooltip="Candidatures encore ouvertes et non clôturées.">
      ?
    </div>
  </div>
  <p class="pending">${pending}</p>
</div>

<div class="card">
  <div class="stat-title">
    <h2>Taux d'acceptation</h2>
    <div class="tooltip"
         data-tooltip="Pourcentage des candidatures acceptées sur le total reçu.">
      ?
    </div>
  </div>
  <p>${acceptanceRate}%</p>
</div>


<div class="card">
  <div class="stat-title">
    <h2>Candidatures</h2>
  </div>

  <div class="cand-control">
    <button onclick="changePeriod(-1)" class="arrow-mini">‹</button>

    <p id="candCount" class="cand-number">0</p>

    <button onclick="changePeriod(1)" class="arrow-mini">›</button>
  </div>

  <p id="candLabel" class="cand-label">Par mois</p>
</div>

<div class="card" onclick="window.location.href='agent.html'">
  <div class="stat-title">
    <h2>Stats par agent</h2>
  </div>

  <p style="font-size:26px; margin:0;">👮</p>
</div>

`;



document.getElementById("voteStats").innerHTML = `

<div class="card">
  <div class="stat-title">
    <h2>Votes positifs</h2>
    <div class="tooltip"
         data-tooltip="Nombre total de votes positifs donnés par tous les recruteurs.">
      ?
    </div>
  </div>
  <p class="accept">${totalYes}</p>
</div>

<div class="card">
  <div class="stat-title">
    <h2>Votes négatifs</h2>
    <div class="tooltip"
         data-tooltip="Nombre total de votes négatifs donnés par tous les recruteurs.">
      ?
    </div>
  </div>
  <p class="reject">${totalNo}</p>
</div>

<div class="card">
  <div class="stat-title">
    <h2>Ratio votes oui</h2>
    <div class="tooltip"
         data-tooltip="Pourcentage de votes positifs par rapport à l'ensemble des votes.">
      ?
    </div>
  </div>
  <p>${voteRatio}%</p>
</div>


<div class="card">
  <div class="stat-title">
    <h2>Temps moyen de traitement</h2>
    <div class="tooltip"
         data-tooltip="Temps moyen entre la création et la décision d'une candidature.">
      ?
    </div>
  </div>
  <p>${avgHours}h ${avgMinutes}min</p>
</div>
`;

document.getElementById("candCount").innerText = candCount;
const labels = ["Jour", "Semaine", "Mois"];

document.getElementById("candLabel").innerText = labels[periodIndex];



document.getElementById("personalStats").innerHTML = `

<div class="card">
  <div class="stat-title">
    <h2>Mes votes positifs</h2>
    <div class="tooltip"
         data-tooltip="Nombre de candidatures que tu as personnellement acceptées.">
      ?
    </div>
  </div>
  <p class="accept">${myYes}</p>
</div>

<div class="card">
  <div class="stat-title">
    <h2>Mes votes négatifs</h2>
    <div class="tooltip"
         data-tooltip="Nombre de candidatures que tu as personnellement refusées.">
      ?
    </div>
  </div>
  <p class="reject">${myNo}</p>
</div>

<div class="card">
  <div class="stat-title">
    <h2>Mes votes totaux</h2>
    <div class="tooltip"
         data-tooltip="Total de tes décisions prises.">
      ?
    </div>
  </div>
  <p>${myTotal}</p>
</div>

<div class="card">
  <div class="stat-title">
    <h2>Mon taux d'acceptation</h2>
    <div class="tooltip"
         data-tooltip="Pourcentage de tes votes qui sont positifs.">
      ?
    </div>
  </div>
  <p>${myRate}%</p>
</div>

`;



  const ctx1 = document.getElementById("pieStatus");

new Chart(ctx1, {
  type: "doughnut",
  data: {
    labels: ["Acceptées", "Refusées", "En attente"],
    datasets: [{
      data: [accepted, refused, pending],
      backgroundColor: ["#22c55e", "#ef4444", "#facc15"],
      borderWidth: 0
    }]
  },
  options: {
    plugins: {
      legend: {
        labels: { color: "white" }
      }
    }
  }
});




const ctx2 = document.getElementById("barVotes");

new Chart(ctx2, {
  type: "bar",
  data: {
    labels: ["Votes positifs", "Votes négatifs"],
    datasets: [{
      data: [totalYes, totalNo],
      backgroundColor: ["#22c55e", "#ef4444"]
    }]
  },
  options: {
    scales: {
      y: {
        ticks: { color: "white" }
      },
      x: {
        ticks: { color: "white" }
      }
    },
    plugins: {
      legend: { display: false }
    }
  }
});
}

loadStats();

</script>

</body>
</html>
